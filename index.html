<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overhoorprogramma · NatuurkundeHub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;
  --bg-secondary:#111827;
  --bg-card:#161f33;
  --bg-card-hover:#1c2844;
  --accent:#3b82f6;
  --accent-glow:rgba(59,130,246,0.25);
  --accent-secondary:#06b6d4;
  --accent-dim:rgba(59,130,246,0.08);
  --accent-border:rgba(59,130,246,0.2);
  --text:#f1f5f9;
  --text-secondary:#94a3b8;
  --text-muted:#64748b;
  --border:rgba(148,163,184,0.08);
  --border-solid:#1e293b;
  --green:#22c55e;
  --green-dim:rgba(34,197,94,0.12);
  --green-border:rgba(34,197,94,0.3);
  --red:#ef4444;
  --red-dim:rgba(239,68,68,0.12);
  --red-border:rgba(239,68,68,0.3);
  --font:'Space Grotesk',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* Grid background */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}

/* ── HEADER ── */
.app-header{
  background:var(--bg-secondary);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  min-height:56px;position:relative;z-index:10;
}
.header-left{display:flex;align-items:center;gap:12px}
.back-link{color:var(--text-muted);text-decoration:none;font-size:18px;padding:4px 8px;border-radius:6px;transition:all .2s}
.back-link:hover{color:var(--accent);background:var(--accent-dim)}
.app-title{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.app-title span{color:var(--accent)}
.nav{display:flex;gap:2px}
.nav-btn{
  padding:8px 18px;border-radius:8px;border:none;font-size:13px;font-weight:500;
  cursor:pointer;background:transparent;color:var(--text-muted);
  font-family:var(--font);transition:all .15s;
}
.nav-btn:hover{background:rgba(59,130,246,0.08);color:var(--text)}
.nav-btn.active{background:var(--accent);color:#fff;font-weight:600}

/* ── MAIN ── */
.main{max-width:860px;margin:0 auto;padding:28px 20px;position:relative;z-index:1}
.panel{display:none}.panel.active{display:block}

/* ── SECTION TITLE ── */
.section-title{
  font-size:15px;font-weight:700;color:var(--accent);
  padding-left:12px;border-left:3px solid var(--accent);margin-bottom:18px;letter-spacing:-0.2px;
}

/* ── LEVEL SELECTOR ── */
.level-selector{
  display:inline-flex;gap:0;margin-bottom:22px;border-radius:10px;overflow:hidden;
  border:1.5px solid var(--border-solid);background:var(--bg-secondary);
}
.lv-btn{
  padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;
  background:transparent;color:var(--text-muted);border:none;
  font-family:var(--font);transition:all .15s;
  border-right:1px solid var(--border-solid);
}
.lv-btn:last-child{border-right:none}
.lv-btn:hover{background:var(--accent-dim);color:var(--text)}
.lv-btn.active{background:var(--accent);color:#fff}

/* ── SETTINGS CARDS ── */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.setting-card{
  background:var(--bg-card);border-radius:12px;border:1px solid var(--border-solid);
  padding:18px;transition:border-color .2s;
}
.setting-card:hover{border-color:var(--accent-border)}
.setting-label{
  font-size:11px;font-weight:700;color:var(--accent);margin-bottom:12px;
  text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono);
}
.check-row{
  display:flex;align-items:center;gap:10px;font-size:14px;margin-bottom:8px;
  cursor:pointer;color:var(--text-secondary);transition:color .15s;
}
.check-row:hover{color:var(--text)}
.check-row input[type=checkbox],.check-row input[type=radio]{
  width:16px;height:16px;cursor:pointer;accent-color:var(--accent);
}
.radio-row{
  display:flex;align-items:center;gap:10px;font-size:14px;margin-bottom:8px;
  cursor:pointer;color:var(--text-secondary);transition:color .15s;
}
.radio-row:hover{color:var(--text)}
.radio-row input[type=radio]{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}

/* Category checks */
.settings-full{
  background:var(--bg-card);border-radius:12px;border:1px solid var(--border-solid);
  padding:18px;margin-bottom:16px;
}
.cat-check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px;margin-top:10px}
.cat-btn-row{display:flex;gap:8px;margin:8px 0}
.cat-toggle-btn{
  font-family:var(--mono);font-size:11px;padding:5px 14px;border-radius:6px;
  border:1px solid var(--border-solid);cursor:pointer;
  background:var(--bg-secondary);color:var(--text-muted);transition:all .15s;
}
.cat-toggle-btn:hover{border-color:var(--accent-border);color:var(--accent)}

/* Timer settings */
.timer-settings{display:flex;align-items:center;gap:8px;margin-top:6px;padding-left:26px}
.timer-input{
  width:60px;border:1.5px solid var(--border-solid);border-radius:8px;
  padding:5px 8px;font-size:13px;font-family:var(--font);
  background:var(--bg-secondary);color:var(--text);
}
.timer-input:focus{outline:none;border-color:var(--accent)}

/* ── START BUTTON ── */
.start-btn{
  width:100%;padding:14px;background:var(--accent);color:#fff;border:none;
  border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;letter-spacing:-0.2px;
}
.start-btn:hover{background:#2563eb;box-shadow:0 0 24px var(--accent-glow)}

/* ── QUIZ ── */
.progress-meta{display:flex;justify-content:space-between;font-size:13px;color:var(--text-muted);margin-bottom:6px}
.progress-meta .score{color:var(--accent);font-weight:700;font-family:var(--mono)}
.progress-bar{height:4px;background:var(--bg-card);border-radius:3px;margin-bottom:18px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-secondary));border-radius:3px;transition:width .4s}

.qcard{
  background:var(--bg-card);border-radius:14px;border:1px solid var(--border-solid);
  padding:28px 24px;margin-bottom:14px;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
}
.given-section{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border-solid)}
.given-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-family:var(--mono)}
.given-value{font-size:28px;font-weight:700;color:var(--text);line-height:1.2}
.given-sub{font-size:13px;color:var(--accent);font-weight:600;margin-top:4px}

.ask-section{display:grid;gap:16px}
.ask-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px;font-family:var(--mono)}

/* Symbol picker */
.sym-picker{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.sym-btn{
  padding:4px 9px;border:1px solid var(--border-solid);border-radius:6px;
  font-size:14px;cursor:pointer;background:var(--bg-secondary);color:var(--text-secondary);
  font-family:var(--font);line-height:1.4;transition:all .15s;
}
.sym-btn:hover{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}

/* Input */
.ask-input{
  width:100%;border:2px solid var(--border-solid);border-radius:10px;
  padding:12px 14px;font-size:16px;background:var(--bg-secondary);color:var(--text);
  font-family:var(--font);transition:all .15s;
}
.ask-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.ask-input.correct{border-color:var(--green);background:var(--green-dim)}
.ask-input.wrong{border-color:var(--red);background:var(--red-dim)}

.answer-reveal{font-size:12px;color:var(--text-muted);margin-top:5px}
.answer-reveal strong{color:var(--accent)}

/* MC buttons */
.mc-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.mc-btn{
  padding:12px 16px;border:1.5px solid var(--border-solid);border-radius:10px;
  font-size:14px;cursor:pointer;background:var(--bg-secondary);color:var(--text-secondary);
  font-family:var(--font);text-align:left;line-height:1.3;transition:all .15s;
}
.mc-btn:hover:not(:disabled){border-color:var(--accent-border);background:var(--accent-dim);color:var(--text)}
.mc-btn.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--text);font-weight:600}
.mc-btn.correct{border-color:var(--green);background:var(--green-dim);color:var(--green);font-weight:600}
.mc-btn.wrong{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.mc-btn:disabled{cursor:default;opacity:0.8}

/* Feedback */
.feedback-bar{
  font-size:14px;font-weight:600;padding:10px 16px;border-radius:10px;
  margin-bottom:12px;display:none;border-left:4px solid;
}
.feedback-bar.ok{background:var(--green-dim);color:var(--green);border-color:var(--green);display:block}
.feedback-bar.nok{background:var(--red-dim);color:var(--red);border-color:var(--red);display:block}

/* Quiz buttons */
.btn-row{display:flex;gap:10px}
.qbtn{
  flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--border-solid);
  font-size:14px;cursor:pointer;background:var(--bg-secondary);color:var(--text-muted);
  font-family:var(--font);font-weight:600;transition:all .15s;
}
.qbtn:hover{border-color:var(--accent-border);color:var(--accent)}
.qbtn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.qbtn.primary:hover{background:#2563eb}

/* Timer */
.timer-ring-wrap{display:flex;justify-content:flex-end;margin-bottom:-4px}
.timer-ring{width:44px;height:44px}
.timer-text{font-size:13px;font-weight:700;fill:var(--text)}
.timer-bg{fill:none;stroke:var(--border-solid);stroke-width:4}
.timer-arc{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset .9s linear,stroke .3s}

/* End screen */
.end-screen{
  background:var(--bg-card);border-radius:14px;border:1px solid var(--border-solid);
  padding:40px 28px;text-align:center;
  box-shadow:0 4px 24px rgba(0,0,0,0.3);
}
.end-score{font-size:58px;font-weight:700;color:var(--text);line-height:1}
.end-score span{font-size:28px;color:var(--text-muted)}
.end-pct{font-size:18px;color:var(--accent);font-weight:700;margin-bottom:5px;font-family:var(--mono)}
.end-sub{font-size:13px;color:var(--text-muted);margin-bottom:20px}
.end-badge{
  display:inline-block;background:var(--accent-dim);color:var(--accent);
  font-size:12px;font-weight:700;padding:5px 16px;border-radius:20px;
  margin-bottom:22px;border:1px solid var(--accent-border);font-family:var(--mono);
}
.end-btns{display:flex;gap:10px;max-width:340px;margin:0 auto}
.retry-section{margin-top:20px;padding-top:20px;border-top:1px solid var(--border-solid)}
.retry-label{font-size:13px;color:var(--text-muted);margin-bottom:12px}

@media(max-width:560px){
  .settings-grid{grid-template-columns:1fr}
  .mc-options{grid-template-columns:1fr}
  .level-selector{display:flex;width:100%}
  .lv-btn{flex:1;text-align:center;padding:9px 6px;font-size:12px}
  .app-header{padding:0 12px}
  .main{padding:20px 12px}
}
</style>
</head>
<body>

<div class="app-header">
  <div class="header-left">
    <a href="/" class="back-link" title="Terug naar NatuurkundeHub">←</a>
    <div class="app-title">Grootheden <span>Overhoor</span></div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showPanel('settings')">Instellingen</button>
    <button class="nav-btn" onclick="showPanel('quiz')">Oefenen</button>
  </div>
</div>

<div class="main">

<!-- SETTINGS PANEL -->
<div class="panel active" id="panel-settings">
  <div class="section-title">Kies je niveau</div>
  <div class="level-selector">
    <button class="lv-btn active" onclick="setLevel('ob')">Onderbouw</button>
    <button class="lv-btn" onclick="setLevel('hv')">Bovenbouw havo</button>
    <button class="lv-btn" onclick="setLevel('vw')">Bovenbouw vwo</button>
  </div>

  <div class="section-title">Wat wil je oefenen?</div>
  <div class="settings-grid">
    <div class="setting-card">
      <div class="setting-label">Wat krijg je te zien?</div>
      <label class="check-row"><input type="checkbox" id="show-naam" checked> Grootheid</label>
      <label class="check-row"><input type="checkbox" id="show-sym"> Symbool</label>
      <label class="check-row"><input type="checkbox" id="show-eenh"> Eenheid</label>
      <label class="check-row"><input type="checkbox" id="show-esym"> Eenheidssymbool</label>
    </div>
    <div class="setting-card">
      <div class="setting-label">Wat moet je invullen?</div>
      <label class="check-row"><input type="checkbox" id="ask-naam"> Grootheid</label>
      <label class="check-row"><input type="checkbox" id="ask-sym" checked> Symbool</label>
      <label class="check-row"><input type="checkbox" id="ask-eenh"> Eenheid</label>
      <label class="check-row"><input type="checkbox" id="ask-esym" checked> Eenheidssymbool</label>
    </div>
    <div class="setting-card">
      <div class="setting-label">Vraagvorm</div>
      <label class="radio-row"><input type="radio" name="qmode" value="open" checked> Open antwoord</label>
      <label class="radio-row"><input type="radio" name="qmode" value="mc"> Multiple choice</label>
    </div>
    <div class="setting-card">
      <div class="setting-label">Volgorde & timer</div>
      <label class="check-row"><input type="checkbox" id="shuffle" checked> Willekeurige volgorde</label>
      <label class="check-row"><input type="checkbox" id="use-timer"> Tijdslimiet per vraag</label>
      <div class="timer-settings">
        <input type="number" class="timer-input" id="timer-sec" value="15" min="5" max="120">
        <span style="font-size:13px;color:var(--text-muted)">seconden</span>
      </div>
    </div>
  </div>

  <div class="settings-full">
    <div class="setting-label">Welke categorieën?</div>
    <div class="cat-btn-row">
      <button class="cat-toggle-btn" onclick="selectVisibleCats(true)">Alles aan</button>
      <button class="cat-toggle-btn" onclick="selectVisibleCats(false)">Alles uit</button>
    </div>
    <div class="cat-check-grid" id="cat-checks"></div>
  </div>

  <button class="start-btn" onclick="startQuiz()">Starten met oefenen</button>
</div>

<!-- QUIZ PANEL -->
<div class="panel" id="panel-quiz">
  <div id="quiz-area"></div>
</div>

</div>

<script>
const FIELDS=['naam','sym','eenh','esym'];
const LABELS={naam:'Grootheid',sym:'Symbool',eenh:'Eenheid',esym:'Eenheidssymbool'};
const SYMBOLS=['Ω','°','µ','·','²','³','⁻¹','⁻²','Δ','λ','ρ','Φ','φ','η','α','β','γ','δ','θ','κ','τ','σ'];

    {lv:'ob',naam:'warmtecapaciteit',sym:'C',eenh:'joule per kelvin',esym:'J/K; J K⁻¹'},
    {lv:'hv',naam:'warmtestroom',sym:'P',eenh:'watt',esym:'W'},
    {lv:'hv',naam:'warmtegeleidingscoëfficiënt',sym:'λ',eenh:'watt per meter kelvin',esym:'W/(m·K); W/m/K; W m⁻¹ K⁻¹'},
    {lv:'hv',naam:'debiet / volumestroom',sym:'Q',eenh:'kubieke meter per seconde',esym:'m³/s; m³ s⁻¹'},
    {lv:'hv',naam:'hoeveelheid stof',sym:'n',eenh:'mol',esym:'mol'},
    {lv:'hv',naam:'concentratie',sym:'c',eenh:'mol per kubieke meter',esym:'mol/m³; mol m⁻³'},
  ]},
  {key:'kern',label:'Kernfysica & straling',def:true,rows:[
    {lv:'hv',naam:'activiteit',sym:'A',eenh:'becquerel',esym:'Bq'},
    {lv:'hv',naam:'geabsorbeerde dosis',sym:'D',eenh:'gray',esym:'Gy'},
    {lv:'hv',naam:'dosisequivalent',sym:'H',eenh:'sievert',esym:'Sv'},
    {lv:'hv',naam:'halveringstijd',sym:'t½',eenh:'seconde',esym:'s'},
    {lv:'hv',naam:'halveringsdikte',sym:'d½',eenh:'meter',esym:'m'},
    {lv:'hv',naam:'massagetal',sym:'A',eenh:'(geen eenheid)',esym:''},
    {lv:'hv',naam:'atoomnummer',sym:'Z',eenh:'(geen eenheid)',esym:''},
    {lv:'hv',naam:'stralingsweegfactor',sym:'w_R',eenh:'sievert per gray',esym:'Sv/Gy'},
    {lv:'vw',naam:'vervalconstante',sym:'λ',eenh:'per seconde',esym:'s⁻¹'},
    {lv:'vw',naam:'fotonenergie',sym:'E',eenh:'joule; electronvolt',esym:'J; eV'},
  ]},
];

let cats=[];
let currentLevel='ob';
let activeInputId=null;

function uid(){return Math.random().toString(36).slice(2,9)}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function normalize(s){
  let v=s.trim().toLowerCase().replace(/\s+/g,' ').replace(/[·.*x×]/g,'·').replace(/\s*·\s*/g,'·');
  // Handle fraction/subscript alternatives
  v=v.replace(/1\/2/g,'½');
  v=v.replace(/\^2/g,'²').replace(/\^3/g,'³').replace(/\^-1/g,'⁻¹').replace(/\^-2/g,'⁻²');
  v=v.replace(/_r/g,'_R'); // w_r → w_R
  return v;
}

function levelsFor(level){
  if(level==='ob')return['ob'];
  if(level==='hv')return['ob','hv'];
  return['ob','hv','vw'];
}

function catHasVisibleRows(cat,level){
  const lv=levelsFor(level);
  return cat.rows.some(r=>lv.includes(r.lv));
}

function init(){
  cats=CATS_DATA.map(c=>({...c,rows:c.rows.map(r=>({id:uid(),...r}))}));
  renderCatChecks();
}

function setLevel(lv){
  currentLevel=lv;
  document.querySelectorAll('.lv-btn').forEach((b,i)=>b.classList.toggle('active',['ob','hv','vw'][i]===lv));
  renderCatChecks();
}

function renderCatChecks(){
  const div=document.getElementById('cat-checks');
  div.innerHTML=cats.filter(c=>catHasVisibleRows(c,currentLevel)).map(c=>`
    <label class="check-row" style="margin-bottom:4px">
      <input type="checkbox" class="cat-chk" value="${c.key}"${c.def?' checked':''}> ${escHtml(c.label)}
    </label>`).join('');
}

function selectVisibleCats(v){document.querySelectorAll('.cat-chk').forEach(c=>c.checked=v);}

function showPanel(p){
  ['settings','quiz'].forEach((n,i)=>{
    document.getElementById('panel-'+n).classList.toggle('active',n===p);
    document.querySelectorAll('.nav-btn')[i].classList.toggle('active',n===p);
  });
  if(p==='settings')renderCatChecks();
}

// ── QUIZ LOGIC ──

let Q={};let timerInt=null;let mcAnswers={};

function activeRowsForQuiz(){
  const checked=Array.from(document.querySelectorAll('.cat-chk:checked')).map(c=>c.value);
  const visLevels=levelsFor(currentLevel);
  return checked.flatMap(k=>(cats.find(c=>c.key===k)?.rows||[]).filter(r=>visLevels.includes(r.lv)));
}
function allPoolRows(){return cats.flatMap(c=>c.rows);}

function startQuiz(){
  const shown=FIELDS.filter(f=>document.getElementById('show-'+f).checked);
  const asked=FIELDS.filter(f=>document.getElementById('ask-'+f).checked);
  if(!shown.length||!asked.length){alert('Kies minimaal één veld om te tonen en één om te vragen.');return}
  const mode=document.querySelector('input[name=qmode]:checked').value;
  const useTimer=document.getElementById('use-timer').checked;
  const timerSec=parseInt(document.getElementById('timer-sec').value)||15;
  let rows=activeRowsForQuiz().filter(r=>shown.some(f=>r[f])&&asked.some(f=>r[f]));
  if(!rows.length){alert('Geen grootheden gevonden voor deze selectie. Pas je instellingen aan.');return}
  if(document.getElementById('shuffle').checked)rows=rows.sort(()=>Math.random()-.5);
  Q={items:rows,idx:0,score:0,wrong:[],checked:false,shown,asked,mode,useTimer,timerSec,retrying:false};
  showPanel('quiz');renderCard();
}

function displayVal(raw){return(raw||'').split(';')[0].trim();}

function symPickerHTML(inputId){
  return `<div class="sym-picker" id="sp-${inputId}">${SYMBOLS.map(s=>`<button class="sym-btn" type="button" tabindex="-1" onclick="activeInputId='${inputId}';insertSymbol('${s.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${escHtml(s)}</button>`).join('')}</div>`;
}

function insertSymbol(sym){
  const inp=document.getElementById(activeInputId);if(!inp)return;
  const s=inp.selectionStart,e=inp.selectionEnd;
  inp.value=inp.value.slice(0,s)+sym+inp.value.slice(e);
  inp.selectionStart=inp.selectionEnd=s+sym.length;
  inp.focus();inp.dispatchEvent(new Event('input'));
}

function renderCard(){
  clearInterval(timerInt);
  const area=document.getElementById('quiz-area');
  const list=Q.retrying?Q.wrong:Q.items;
  if(Q.idx>=list.length){showEnd();return}
  const row=list[Q.idx];
  const pct=Math.round(Q.idx/list.length*100);
  const timerHTML=Q.useTimer?`<div class="timer-ring-wrap"><svg class="timer-ring" viewBox="0 0 44 44"><circle class="timer-bg" cx="22" cy="22" r="18"/><circle class="timer-arc" id="tarc" cx="22" cy="22" r="18" stroke-dasharray="113" stroke-dashoffset="0"/><text class="timer-text" x="22" y="27" text-anchor="middle" id="ttext">${Q.timerSec}</text></svg></div>`:'';
  const shownItems=Q.shown.filter(f=>row[f]);
  const mainField=shownItems[0];
  const subFields=shownItems.slice(1);
  let askHTML='';
  if(Q.mode==='open'){
    askHTML=Q.asked.filter(f=>row[f]).map(f=>{
      const iid='qi-'+f;
      return `<div class="ask-item"><label class="ask-label" for="${iid}">${LABELS[f]}</label><input class="ask-input" id="${iid}" autocomplete="off" spellcheck="false" placeholder="Typ hier..." onfocus="activeInputId='${iid}'" onkeydown="if(event.key==='Enter')checkAnswer()">${symPickerHTML(iid)}</div>`;
    }).join('');
  } else {
    askHTML=Q.asked.filter(f=>row[f]).map(f=>{
      const variants=(row[f]||'').split(';').map(x=>x.trim()).filter(Boolean);
      const primary=variants[0];
      const pool=allPoolRows().map(r=>displayVal(r[f])).filter(v=>v&&!variants.map(normalize).includes(normalize(v)));
      const opts=[primary,...[...new Set(pool)].sort(()=>Math.random()-.5).slice(0,3)].sort(()=>Math.random()-.5);
      return `<div class="ask-item"><label class="ask-label">${LABELS[f]}</label><div class="mc-options" id="mc-${f}">${opts.map((o,i)=>`<button class="mc-btn" type="button" onclick="selectMC('${f}',${i})">${escHtml(o)}</button>`).join('')}</div></div>`;
    }).join('');
  }
  area.innerHTML=`
    <div class="progress-meta"><span>${Q.retrying?'Herhaling fouten':'Vraag'} ${Q.idx+1} / ${list.length}</span><span class="score">Score: ${Q.score}</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    ${timerHTML}
    <div class="qcard">
      <div class="given-section">
        <div class="given-label">${LABELS[mainField]}</div>
        <div class="given-value">${escHtml(displayVal(row[mainField]))}</div>
        ${subFields.map(f=>`<div class="given-sub">${LABELS[f]}: ${escHtml(displayVal(row[f]))}</div>`).join('')}
      </div>
      <div class="ask-section">${askHTML}</div>
    </div>
    <div class="feedback-bar" id="feedback"></div>
    <div class="btn-row">
      <button class="qbtn" id="btn-skip" onclick="skipCard()">Weet ik niet</button>
      <button class="qbtn primary" id="btn-check" onclick="checkAnswer()">Controleer</button>
    </div>`;
  if(Q.mode==='open'){const f=Q.asked.find(f=>row[f]);if(f){const el=document.getElementById('qi-'+f);if(el){el.focus();activeInputId='qi-'+f;}}}
  if(Q.useTimer)startTimer();
}

function selectMC(field,idx){
  if(Q.checked)return;
  mcAnswers[field]=idx;
  document.querySelectorAll(`#mc-${field} .mc-btn`).forEach((b,i)=>b.classList.toggle('selected',i===idx));
}

function checkValue(given,correctRaw){
  const g=normalize(given);
  return(correctRaw||'').split(';').map(x=>normalize(x.trim())).some(v=>v===g||v===g.replace(/·/g,' '));
}

function startTimer(){
  let left=Q.timerSec;
  const update=()=>{
    const arc=document.getElementById('tarc');const txt=document.getElementById('ttext');
    if(!arc)return;
    arc.style.strokeDashoffset=113*(1-left/Q.timerSec);
    arc.style.stroke=left<=5?'var(--red)':'var(--accent)';
    txt.textContent=left;
    if(left<=0){clearInterval(timerInt);skipCard();}
    left--;
  };
  update();timerInt=setInterval(update,1000);
}

function revealHTML(correctRaw){
  const variants=(correctRaw||'').split(';').map(x=>x.trim()).filter(Boolean);
  return `Antwoord: <strong>${escHtml(variants[0]||'')}</strong>`+(variants.length>1?` <span style="color:var(--text-muted);font-size:11px">(ook: ${escHtml(variants.slice(1).join(', '))})</span>`:'');
}

function checkAnswer(){
  clearInterval(timerInt);
  if(Q.checked){nextCard();return}
  const list=Q.retrying?Q.wrong:Q.items;
  const row=list[Q.idx];
  const fields=Q.asked.filter(f=>row[f]);
  let allOk=true;
  if(Q.mode==='open'){
    fields.forEach(f=>{
      const inp=document.getElementById('qi-'+f);if(!inp)return;
      const ok=checkValue(inp.value,row[f]);
      inp.classList.toggle('correct',ok);inp.classList.toggle('wrong',!ok);inp.readOnly=true;
      document.getElementById('sp-qi-'+f)?.remove();
      if(!ok){allOk=false;const d=document.createElement('div');d.className='answer-reveal';d.innerHTML=revealHTML(row[f]);inp.after(d);}
    });
  } else {
    fields.forEach(f=>{
      const selIdx=mcAnswers[f];if(selIdx===undefined)allOk=false;
      document.querySelectorAll(`#mc-${f} .mc-btn`).forEach((b,i)=>{
        const isCorrect=checkValue(b.textContent,row[f]);
        b.disabled=true;
        if(isCorrect)b.classList.add('correct');
        else if(i===selIdx&&!isCorrect){b.classList.add('wrong');allOk=false;}
      });
    });
  }
  if(allOk)Q.score++;else if(!Q.retrying)Q.wrong.push(row);
  const fb=document.getElementById('feedback');
  fb.textContent=allOk?'Goed!':'Niet correct.';fb.className='feedback-bar '+(allOk?'ok':'nok');
  Q.checked=true;document.getElementById('btn-check').textContent='Volgende';document.getElementById('btn-skip').style.display='none';mcAnswers={};
}

function skipCard(){
  clearInterval(timerInt);if(Q.checked){nextCard();return}
  const list=Q.retrying?Q.wrong:Q.items;const row=list[Q.idx];
  Q.asked.filter(f=>row[f]).forEach(f=>{
    if(Q.mode==='open'){
      const inp=document.getElementById('qi-'+f);
      if(inp){inp.classList.add('wrong');inp.readOnly=true;document.getElementById('sp-qi-'+f)?.remove();const d=document.createElement('div');d.className='answer-reveal';d.innerHTML=revealHTML(row[f]);inp.after(d);}
    } else {
      document.querySelectorAll(`#mc-${f} .mc-btn`).forEach(b=>{b.disabled=true;if(checkValue(b.textContent,row[f]))b.classList.add('correct');});
    }
  });
  if(!Q.retrying)Q.wrong.push(row);
  const fb=document.getElementById('feedback');fb.textContent='Overgeslagen.';fb.className='feedback-bar nok';
  Q.checked=true;document.getElementById('btn-check').textContent='Volgende';document.getElementById('btn-skip').style.display='none';mcAnswers={};
}

function nextCard(){Q.idx++;Q.checked=false;renderCard();}

function showEnd(){
  clearInterval(timerInt);
  const total=Q.retrying?Q.wrong.length:Q.items.length;
  const pct=Math.round(Q.score/total*100);
  const msg=pct>=90?'Uitstekend!':pct>=70?'Goed gedaan!':pct>=50?'Blijf oefenen!':'Nog veel te leren!';
  const wc=Q.wrong.length;
  const retryHTML=(!Q.retrying&&wc>0)?`<div class="retry-section"><div class="retry-label">${wc} vraag${wc>1?'en':''} fout. Wil je die herhalen?</div><button class="qbtn primary" onclick="retryWrong()">Fouten herhalen (${wc})</button></div>`:'';
  document.getElementById('quiz-area').innerHTML=`<div class="end-screen">
    <div style="font-size:22px;font-weight:700;color:var(--text);margin-bottom:16px">${msg}</div>
    <div class="end-score">${Q.score}<span>/${total}</span></div>
    <div class="end-pct">${pct}%</div><div class="end-sub">correct beantwoord</div>
    <div class="end-badge">${Q.retrying?'Herhaling voltooid':'Ronde afgerond'}</div>
    <div class="end-btns"><button class="qbtn" onclick="showPanel('settings')">Instellingen</button><button class="qbtn primary" onclick="startQuiz()">Opnieuw</button></div>
    ${retryHTML}</div>`;
}

function retryWrong(){
  const wrong=[...Q.wrong];
  Q={...Q,items:wrong,wrong:[],idx:0,score:0,checked:false,retrying:true};renderCard();
}

init();
</script>
